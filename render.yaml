services:
  - type: web
    name: kaga-command-center
    runtime: node
    plan: free
    buildCommand: pip3 install python-pptx --break-system-packages --quiet || pip install python-pptx --quiet; npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: REQUIRE_LOGIN
        value: "true"
      - key: ADMIN_USERNAME
        value: MAYADEEN
      - key: ADMIN_PASSWORD
        value: Mayadeen@2026
